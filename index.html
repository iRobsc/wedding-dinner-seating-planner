<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Seating Planner</title>
  <meta name="description"
    content="Interactive wedding dinner seating arrangement planner with drag-and-drop functionality." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-left">
      <h1 class="app-title">💍 Seating Planner</h1>
    </div>
    <div class="toolbar-center">
      <button id="btn-zoom-out" class="tool-btn" title="Zoom Out">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>
      <span id="zoom-level" class="zoom-label">100%</span>
      <button id="btn-zoom-in" class="tool-btn" title="Zoom In">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="11" y1="8" x2="11" y2="14" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>
      <button id="btn-zoom-fit" class="tool-btn" title="Fit to View">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
        </svg>
      </button>
      <div class="toolbar-divider"></div>
      <button id="btn-edit-mode" class="tool-btn" title="Edit Layout Mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        <span class="btn-label">Edit Layout</span>
      </button>
      <button id="btn-add-table" class="tool-btn" title="Add Table" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
        <span class="btn-label">Add Table</span>
      </button>
    </div>
    <div class="toolbar-right">
      <button id="btn-theme-toggle" class="tool-btn" title="Toggle Light/Dark Mode">
        <svg id="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg id="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" style="display:none;">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <div id="app-container">
    <!-- Infinite canvas -->
    <div id="canvas-viewport">
      <div id="canvas-world">
        <!-- Tables, seats, and placed guests render here -->
      </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Guests</h2>
        <span id="guest-count" class="badge">0</span>
      </div>
      <div class="sidebar-add">
        <input type="text" id="guest-input" placeholder="Guest name..." autocomplete="off" />
        <button id="btn-add-guest" title="Add Guest">+</button>
      </div>
      <div id="guest-list" class="sidebar-guests">
        <!-- Unassigned guest cards go here -->
      </div>
      <div class="sidebar-stats">
        <div class="stat">
          <span class="stat-label">Seated</span>
          <span id="stat-seated" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Unseated</span>
          <span id="stat-unseated" class="stat-value">0</span>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
